name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to deploy (leave empty for latest successful build)'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Determine commit to use
        id: determine
        run: |
          if [ -n "${{ github.event.inputs.commit_sha }}" ]; then
            echo "sha=${{ github.event.inputs.commit_sha }}" >> $GITHUB_OUTPUT
          else
            # Use the known good commit from April 10
            echo "sha=1ff16915f580297ee5ae7c8c1d1b46e7c7f7cf1b" >> $GITHUB_OUTPUT
          fi

      - name: Download files from commit
        run: |
          # Use GitHub API to download the tree as an archive
          COMMIT_SHA="${{ steps.determine.outputs.sha }}"
          
          mkdir -p output
          mkdir -p output/canvaskit/chromium
          mkdir -p output/icons
          mkdir -p output/assets
          
          # Download each file with -f flag to fail silently (no error if 404)
          # But we need these files to exist
          
          download_file() {
            local path="$1"
            local out="$2"
            local url="https://raw.githubusercontent.com/serbel82-wq/new-neuro-explorer/${COMMIT_SHA}/${path}"
            echo "Downloading ${path}..."
            curl -sL -f "$url" -o "$out" || echo "Warning: Failed to download ${path}"
          }
          
          # Download main files (critical)
          download_file "main.dart.js" "output/main.dart.js"
          download_file "flutter_bootstrap.js" "output/flutter_bootstrap.js"
          download_file "flutter_service_worker.js" "output/flutter_service_worker.js"
          download_file "index.html" "output/index.html"
          download_file "manifest.json" "output/manifest.json"
          download_file "version.json" "output/version.json"
          download_file "flutter.js" "output/flutter.js"
          
          # Download canvaskit
          download_file "canvaskit/canvaskit.js" "output/canvaskit/canvaskit.js"
          download_file "canvaskit/canvaskit.wasm" "output/canvaskit/canvaskit.wasm"
          download_file "canvaskit/chromium/canvaskit.js" "output/canvaskit/chromium/canvaskit.js"
          download_file "canvaskit/chromium/canvaskit.wasm" "output/canvaskit/chromium/canvaskit.wasm"
          
          # Download icons
          download_file "icons/Icon-192.png" "output/icons/Icon-192.png"
          download_file "icons/Icon-512.png" "output/icons/Icon-512.png"
          
          # Download assets
          download_file "assets/AssetManifest.json" "output/assets/AssetManifest.json"
          download_file "assets/FontManifest.json" "output/assets/FontManifest.json"
          
          # Create .nojekyll
          touch output/.nojekyll
          
          ls -la output/
          
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          force_orphan: true