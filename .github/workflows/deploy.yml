name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.3'
          channel: 'stable'

      - name: Enable web support
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Build web release
        run: flutter build web --release --web-renderer html

      - name: Deploy using GitHub API
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Read all files from build/web
            const buildDir = 'build/web';
            const files = {};
            
            function walkDir(dir, basePath = '') {
              const entries = fs.readdirSync(dir, { withFileTypes: true });
              for (const entry of entries) {
                const fullPath = path.join(dir, entry.name);
                const relativePath = path.join(basePath, entry.name);
                if (entry.isDirectory()) {
                  walkDir(fullPath, relativePath);
                } else {
                  const content = fs.readFileSync(fullPath);
                  files[relativePath] = content.toString('base64');
                }
              }
            }
            
            walkDir(buildDir);
            
            console.log('Files to deploy:', Object.keys(files).length);
            
            // Push to gh-pages using GitHub API
            const { owner, repo } = context.repo;
            
            // Get current gh-pages tree
            const { data: refData } = await github.rest.git.getRef({
              owner,
              ref: 'heads/gh-pages',
            });
            
            // Create blobs for each file
            const blobs = {};
            for (const [filePath, content] of Object.entries(files)) {
              const { data: blob } = await github.rest.git.createBlob({
                owner,
                repo,
                content,
                encoding: 'base64',
              });
              blobs[filePath] = blob.sha;
            }
            
            // Create tree
            const tree = Object.entries(blobs).map(([path, sha]) => ({
              path,
              mode: '100644',
              type: 'blob',
              sha,
            }));
            
            const { data: treeData } = await github.rest.git.createTree({
              owner,
              repo,
              base_tree: refData.object.sha,
              tree,
            });
            
            // Create commit
            const { data: commit } = await github.rest.git.createCommit({
              owner,
              repo,
              message: 'Deploy: ' + process.env.GITHUB_SHA,
              tree: treeData.sha,
              parents: [refData.object.sha],
            });
            
            // Update ref
            await github.rest.git.updateRef({
              owner,
              ref: 'heads/gh-pages',
              sha: commit.sha,
            });
            
            console.log('Deployed successfully! Commit:', commit.sha);