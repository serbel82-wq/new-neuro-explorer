name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit info for cache key
        run: echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: '3.27.3'
          channel: 'stable'

      - name: Enable web support
        run: flutter config --enable-web

      - name: Clean any cached build
        run: |
          rm -rf .dart_tool build

      - name: Get dependencies
        run: |
          echo "Running pub get..."
          flutter pub get
          echo "Checking packages..."
          flutter pub deps

      - name: Build Flutter Web
        run: |
          echo "Starting build..."
          flutter build web --release -v 2>&1 | tee build.log
          echo "Build log:"
          cat build.log

      - name: Verify build output
        run: |
          ls -la build/web/
          test -f build/web/main.dart.js || (echo "ERROR: main.dart.js not found" && exit 1)
          test -f build/web/index.html || (echo "ERROR: index.html not found" && exit 1)
          test -f build/web/flutter.js || (echo "ERROR: flutter.js not found" && exit 1)
          echo "Build verification passed!"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: gh-pages
          force_orphan: true