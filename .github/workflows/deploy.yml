name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Enable web support
        run: flutter config --enable-web

      - name: Get dependencies
        run: flutter pub get

      - name: Clean build
        run: flutter clean

      - name: Build Flutter Web
        run: flutter build web --release --web-renderer html

      - name: Verify build output
        run: |
          ls -la build/web/
          test -f build/web/main.dart.js || (echo "ERROR: main.dart.js not found" && exit 1)
          test -f build/web/index.html || (echo "ERROR: index.html not found" && exit 1)
          test -f build/web/flutter.js || (echo "ERROR: flutter.js not found" && exit 1)
          echo "Build verification passed!"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: gh-pages
          force_orphan: true