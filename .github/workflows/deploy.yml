name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.3'

      - run: flutter config --enable-web
        working-directory: .

      - run: flutter pub get
        working-directory: .

      - run: flutter build web --release --web-renderer html
        working-directory: .

      - name: Deploy via API
        working-directory: .
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const buildDir = path.join(process.cwd(), 'build', 'web');
            
            // Get all files recursively
            const files = {};
            function getFiles(dir, base = '') {
              const items = fs.readdirSync(dir);
              for (const item of items) {
                const fullPath = path.join(dir, item);
                const relPath = base ? path.join(base, item) : item;
                const stat = fs.statSync(fullPath);
                if (stat.isDirectory()) {
                  getFiles(fullPath, relPath);
                } else {
                  files[relPath] = fs.readFileSync(fullPath);
                }
              }
            }
            
            getFiles(buildDir);
            console.log('Found', Object.keys(files).length, 'files');
            console.log('Build dir exists:', fs.existsSync(buildDir));
            console.log('Files:', Object.keys(files).slice(0, 10));
            
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Create blobs
            const blobs = {};
            for (const [filePath, content] of Object.entries(files)) {
              const { data } = await github.rest.git.createBlob({
                owner,
                repo,
                content: content.toString('base64'),
                encoding: 'base64'
              });
              blobs[filePath] = data.sha;
            }
            
            // Get current gh-pages ref
            let parentSha = null;
            try {
              const { data: ref } = await github.rest.git.getRef({
                owner,
                repo,
                ref: 'heads/gh-pages'
              });
              parentSha = ref.object.sha;
            } catch (e) {
              console.log('No existing gh-pages, creating from scratch');
            }
            
            // Create tree
            const tree = Object.entries(blobs).map(([path, sha]) => ({
              path,
              mode: '100644',
              type: 'blob',
              sha
            }));
            
            const { data: treeData } = await github.rest.git.createTree({
              owner,
              repo,
              tree,
              base_tree: parentSha || undefined
            });
            
            // Create commit
            const { data: commit } = await github.rest.git.createCommit({
              owner,
              repo,
              message: 'Deploy: ' + process.env.GITHUB_SHA,
              tree: treeData.sha,
              parents: parentSha ? [parentSha] : []
            });
            
            // Update ref
            await github.rest.git.updateRef({
              owner,
              repo,
              ref: 'heads/gh-pages',
              sha: commit.sha,
              force: true
            });
            
            console.log('Deployed to gh-pages:', commit.sha);