name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug - check repo visibility
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Is private: ${{ github.repository_private }}"

      - name: Build and Deploy
        uses: bluefireteam/flutter-gh-pages@v9
        with:
          baseHref: /new-neuro-explorer/
          customArgs: '--verbose'